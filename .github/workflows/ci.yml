name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Zig
        uses: mlugg/setup-zig@v2
        with:
          version: 0.16.0

      - run: zig build

  fmt-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - run: pip install 'clang-format==22.1.5'

      - name: Set up Zig
        uses: mlugg/setup-zig@v2
        with:
          version: 0.16.0

      - run: zig build fmt-check
