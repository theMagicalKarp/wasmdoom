name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install Binaryen
        uses: ./.github/actions/setup-binaryen
        with:
          version: version_129
          shasum: 50b9fa62b9abea752da92ec57e0c555fee578760cd237c40107957715d2976ba

      - name: Setup `wasmtime`
        uses: bytecodealliance/actions/wasmtime/setup@9152e710e9f7182e4c29ad218e4f335a7b203613 # v1.1.3
        with:
          version: "44.0.1"

      - name: Set up Zig
        uses: ./.github/actions/setup-zig
        with:
          version: 0.16.0
          shasum: 70e49664a74374b48b51e6f3fdfbf437f6395d42509050588bd49abe52ba3d00

      - name: zig build
        run: make wasm

      - name: Verify WASM Execution
        run: make wasm-verify

      - name: Upload wasm artifact
        uses: actions/upload-artifact@v7
        with:
          name: wasmdoom-wasm
          path: zig-out/bin/*.wasm
          if-no-files-found: error
          retention-days: 3

  fmt-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - run: pip install 'clang-format==22.1.5'
      - run: make fmt-check

  web:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      pages: write
      id-token: write
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v6

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: web/package-lock.json

      - run: npm ci

      - name: Check formatting
        run: npm run format:check

      - name: Type-check
        run: npm run typecheck

      - name: Unit tests
        run: npm run test

      - name: Download wasm artifact
        uses: actions/download-artifact@v8
        with:
          name: wasmdoom-wasm
          path: zig-out/bin

      - name: Build web bundle
        run: npm run build

      - name: Upload web dist artifact
        uses: actions/upload-artifact@v7
        with:
          name: web-dist
          path: web/dist
          if-no-files-found: error
          retention-days: 5

      - name: Build pages bundle
        run: npm run build
        env:
          BASE_PATH: /wasmdoom/

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: web/dist

  deploy:
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    needs: [web]

    permissions:
      pages: write
      id-token: write

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
